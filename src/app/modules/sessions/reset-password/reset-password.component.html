<div [dir]="globalDataService.getdir()">

  <div class="card o-hidden loginTransparent"
  [@animate]="{value:'*',params:{y:'120px',opacity:'0',delay:'100ms', duration: '400ms'}}">
      <div class="row">
        <div class="col-md-6">
          <div class="p-4">
            <div class="auth-logo text-center mb-4">
              <img src="{{globalDataService.getLogoPicture()}}" alt="">
            </div>
            <div>
  
              <h1 class="mb-3 text-18">{{"reset_Password_header" | translate}}</h1>
              <form [formGroup]="form" *ngIf="form" validateOnSubmit>
               
                <div class="form-group">
                  <label for="password">{{"reset_Password" | translate}}<span class="text-danger"> * </span></label>
                  <div class="input-group">
                    <input
                      id="password"
                      formControlName="password"
                      class="form-control form-control-rounded"
                      [type]="showPassword ? 'text' : 'password'"
                    />
                    <div class="input-group-append">
                      <button
                        type="button"
                        class="btn btn-outline-secondary"
                        (click)="togglePasswordVisibility('password')"
                      >
                        <i class="i-Eye" *ngIf="!showPassword"></i>
                        <i class="i-Eye-Blocked" *ngIf="showPassword"></i>
                      </button>
                    </div>
                  </div>
                </div>
               
  
                <div class="form-group">
                  <label for="confirmPassword">{{"reset_Password_Confirm_Password" | translate}}<span class="text-danger"> * </span></label>
                  <div class="input-group">
                    <input
                      id="confirmPassword"
                      formControlName="confirmPassword"
                      (input)="onPasswordChange()"
                      class="form-control form-control-rounded"
                      [type]="showConfirmPassword ? 'text' : 'password'"
                    />
                    <div class="input-group-append">
                      <button
                        type="button"
                        class="btn btn-outline-secondary"
                        (click)="togglePasswordVisibility('confirm')"
                      >
                        <i class="i-Eye" *ngIf="!showConfirmPassword"></i>
                        <i class="i-Eye-Blocked" *ngIf="showConfirmPassword"></i>
                      </button>
                    </div>
                  </div>
                
                  <div
                  class="alert alert-danger"
                  style="
                    background-color: transparent;
                    border: none;
                    margin-top: -4%;
                    margin-left: -4%;
                    margin-bottom: -8%;
                  "
                  *ngIf="form.get('confirmPassword').errors?.confirmPasswordValidator"
                >
                   {{"reset_Password_Password_didnt_match_Message" | translate}}
                </div>
                
                </div>
  
                <button (click)="onSubmit()" [disabled]="form.invalid" class="btn btn-primary btn-block btn-rounded mt-3">{{"reset_Password_Reset_Password_Button" | translate}}</button>
  
              </form>
  
            </div>
  
          </div>
        </div>
        <div class="col-md-6 text-center " style="background-size: cover;background-image: url(./assets/images/photo-long-3.jpg)">
          <div class="pr-3 auth-right">
            <!-- <button class="btn btn-outline-primary btn-outline-email btn-block btn-icon-text btn-rounded" routerLink="/sessions/signup">
              <i class="i-Mail-with-At-Sign"></i>
              Sign up 
            </button> -->
            <button class="btn btn-outline-primary btn-outline-google btn-block btn-icon-text btn-rounded" routerLink="/sessions/signin">
              <i class="i-Mail-with-At-Sign"></i>
              {{"reset_Password_Sign_in_Button" | translate}}
            </button>
           
          </div>
        </div>
      </div>
    </div>

</div>
