<div [dir]="globalDataService.getdir()">

    <div class="card o-hidden loginTransparent signin-card"
        [@animate]="{value:'*',params:{y:'120px',opacity:'0',delay:'100ms', duration: '400ms'}}">
        <div class="signin-card-body">
            <div class="auth-logo text-center">
                <img src="{{globalDataService.getLogoPicture()}}" alt="">
            </div>
            <div class="text-left">
                <h1 class="mb-1 text-25">Sign In</h1>
                <hr class="loginHr" />
            </div>
            <form [formGroup]="signinForm" (ngSubmit)="signin()" class="loginForm signin-form">

                <div class="form-group">
                    <label for="tenancyName">Tenant Name</label>
                    <input id="tenancyName"
                        class="form-control loginTransparent"
                        formControlName="tenancyName"
                        type="text"
                        autocomplete="organization"
                        (blur)="onTenantNameBlur()"
                        [class.is-invalid]="(f.tenancyName.touched || f.tenancyName.dirty) && f.tenancyName.errors"
                    />
                    <small class="form-text text-muted" *ngIf="tenantValidating">Validating tenant...</small>
                    <small class="form-text text-success" *ngIf="tenantValidated && !tenantValidating">Tenant validated</small>
                    <div class="invalid-feedback" *ngIf="f.tenancyName.errors?.required">
                        Tenant name is required
                    </div>
                </div>

                <div class="form-group">
                    <label for="userNameOrEmailAddress">Username or Email</label>
                    <input id="userNameOrEmailAddress" class="form-control loginTransparent" formControlName="userNameOrEmailAddress"
                        type="email"
                        autocomplete="username"
                        (input)="syncAutofillCredentials()"
                        [class.is-invalid]="(f.userNameOrEmailAddress.touched || f.userNameOrEmailAddress.dirty) && f.userNameOrEmailAddress.errors">
                </div>

                <div class="form-group position-relative signin-password-group">
                    <label for="password">Password</label>
                    <input
                        id="password"
                        class="form-control loginTransparent pr-4"
                        formControlName="password"
                        [type]="showPassword ? 'text' : 'password'"
                        autocomplete="current-password"
                        (input)="syncAutofillCredentials()"
                        [class.is-invalid]="(f.password.touched || f.password.dirty) && f.password.errors"
                    />
                    <span
                        class="field-eye position-absolute togglePassword"
                        (click)="togglePassword()"
                    >
                        <i class="fa fontAwesome_Li_Class" [ngClass]="!showPassword ? 'fa-eye-slash fa-1x' : 'fa-eye fa-1x'"></i>
                    </span>
                </div>

                <button
                    type="submit"
                    class="btn btn-primary btn-block signin-submit-btn"
                    [disabled]="!canSignIn">
                    Sign In
                </button>

                <div class="signin-forgot-wrap">
                    <a class="btn btn-rounded btn-outline-danger btn-block btn-icon-text signin-forgot-btn" routerLink="/sessions/forgot">
                        Forgot Password?
                    </a>
                </div>
            </form>
        </div>
    </div>

</div>
