<div class="modal-body shipping-rule-form">
  <h3 class="text-center fw-semibold mb-4">{{ title | translate }}</h3>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-group">
      <label class="font-weight-bold">{{ 'Name' | translate }} <span class="text-danger">*</span></label>
      <input
        type="text"
        class="form-control"
        formControlName="name"
        [placeholder]="'Enter Name' | translate"
      />
      <div *ngIf="submitted && f.name.errors" class="text-danger small mt-1">
        {{ 'Name is required' | translate }}
      </div>
    </div>

    <div class="form-group">
      <label class="font-weight-bold">{{ 'Rule Type' | translate }} <span class="text-danger">*</span></label>
      <select class="form-control" formControlName="ruleType">
        <option value="">{{ 'Select Rule Type' | translate }}</option>
        <option *ngFor="let t of ruleTypes" [value]="t.value">{{ t.label }}</option>
      </select>
      <div *ngIf="submitted && f.ruleType.errors" class="text-danger small mt-1">
        {{ 'Rule type is required' | translate }}
      </div>
    </div>

    <div class="row">
      <div class="col-md-6 form-group">
        <label class="font-weight-bold">{{ 'Minimum' | translate }} <span class="text-danger">*</span></label>
        <input
          type="number"
          class="form-control"
          formControlName="min"
          [placeholder]="'Enter Minimum Value' | translate"
        />
      </div>
      <div class="col-md-6 form-group">
        <label class="font-weight-bold">{{ 'Maximum' | translate }} <span class="text-danger">*</span></label>
        <input
          type="number"
          class="form-control"
          formControlName="max"
          [placeholder]="'Enter Maximum Value' | translate"
        />
      </div>
    </div>

    <div class="form-group">
      <label class="font-weight-bold">{{ 'Shipping Type' | translate }} <span class="text-danger">*</span></label>
      <select class="form-control" formControlName="shippingType">
        <option *ngFor="let t of shippingTypes" [value]="t.value">{{ t.label }}</option>
      </select>
    </div>

    <div class="form-group" *ngIf="showAmount && f.shippingType.value === 'fixed'">
      <label class="font-weight-bold">{{ 'Amount' | translate }} <span class="text-danger">*</span></label>
      <div class="input-group">
        <div class="input-group-prepend">
          <span class="input-group-text">$</span>
        </div>
        <input
          type="number"
          class="form-control"
          formControlName="amount"
          [placeholder]="'Enter Amount' | translate"
        />
      </div>
    </div>

    <div class="form-group" *ngIf="showAmount && f.shippingType.value === 'percentage'">
      <label class="font-weight-bold">{{ 'Percentage' | translate }} <span class="text-danger">*</span></label>
      <div class="input-group">
        <input
          type="number"
          class="form-control"
          formControlName="amount"
          min="0"
          max="100"
          [placeholder]="'Enter Percentage' | translate"
        />
        <div class="input-group-append">
          <span class="input-group-text">%</span>
        </div>
      </div>
    </div>

    <div class="text-right mt-4">
      <button type="button" class="btn btn-outline-secondary mr-2" (click)="close()">
        {{ 'Cancel' | translate }}
      </button>
      <button type="submit" class="btn btn-primary" [disabled]="isLoading">
        {{ 'Submit' | translate }}
      </button>
    </div>
  </form>
</div>
