<div class="modal-header">
  <h4 class="modal-title">{{ title }}</h4>
  <button type="button" class="close" aria-label="Close" (click)="dismiss()">
    <span aria-hidden="true">&times;</span>
  </button>
</div>

<div class="modal-body">
  <div class="confirmation-dialog" [ngClass]="'confirmation-dialog--' + icon">
    <div class="confirmation-dialog__icon" *ngIf="icon !== 'none'">
      <i class="fas fontAwesome_Li_Class" [ngClass]="iconClass"></i>
    </div>
    <div class="confirmation-dialog__content">
      <p class="confirmation-dialog__message mb-0">{{ message }}</p>
      <p class="confirmation-dialog__detail text-muted mb-0" *ngIf="detail">{{ detail }}</p>
    </div>
  </div>

  <div class="confirmation-dialog__form" *ngIf="showAccountSelect || showRefundAmount">
    <div class="form-group" *ngIf="showAccountSelect">
      <label class="form-field__label">
        {{ accountLabel }}
        <span *ngIf="accountRequired" class="text-danger">*</span>
      </label>
      <select class="form-control form-control-sm"
        [(ngModel)]="selectedAccountId"
        [class.is-invalid]="accountError">
        <option [ngValue]="null">Select account</option>
        <option *ngFor="let account of accountOptions" [ngValue]="account.value">
          {{ account.label }}
        </option>
      </select>
      <div class="invalid-feedback d-block" *ngIf="accountError">{{ accountError }}</div>
    </div>

    <div class="form-group mb-0" *ngIf="showRefundAmount">
      <label class="form-field__label">
        {{ refundAmountLabel }}
        <span class="text-danger">*</span>
      </label>
      <input type="number" class="form-control form-control-sm" min="0" step="0.01"
        [(ngModel)]="refundAmount"
        [class.is-invalid]="refundAmountError" />
      <div class="invalid-feedback d-block" *ngIf="refundAmountError">{{ refundAmountError }}</div>
    </div>
  </div>
</div>

<div class="modal-footer">
  <button type="button" class="btn btn-outline-secondary btn-rounded" (click)="dismiss()">
    {{ cancelText }}
  </button>
  <button type="button" ngbAutofocus class="btn btn-rounded" [ngClass]="confirmButtonClass" (click)="confirm()">
    {{ confirmText }}
  </button>
</div>
